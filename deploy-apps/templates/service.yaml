{{- range $app := .Values.apps }}
{{- if $app.enabled }}
{{- if eq (include "deploy-apps.app.shouldHaveService" (dict "app" $app)) "true" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "deploy-apps.app.fullname" (dict "root" $ "app" $app) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "deploy-apps.app.labels" (dict "root" $ "app" $app) | nindent 4 }}
    {{- if $app.service }}
    {{- with $app.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- end }}
  {{- if and $app.service $app.service.annotations }}
  annotations:
    {{- toYaml $app.service.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- $svc := $app.service | default dict }}
  type: {{ $svc.type | default "ClusterIP" }}
  {{- if $svc.clusterIP }}
  clusterIP: {{ $svc.clusterIP }}
  {{- end }}
  {{- if $svc.sessionAffinity }}
  sessionAffinity: {{ $svc.sessionAffinity }}
  {{- end }}
  {{- if $svc.externalTrafficPolicy }}
  externalTrafficPolicy: {{ $svc.externalTrafficPolicy }}
  {{- end }}
  {{- if $svc.loadBalancerIP }}
  loadBalancerIP: {{ $svc.loadBalancerIP }}
  {{- end }}
  {{- if $svc.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml $svc.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if $svc.ports }}
  ports:
    {{- toYaml $svc.ports | nindent 4 }}
  {{- end }}
  selector:
    {{- include "deploy-apps.app.selectorLabels" (dict "root" $ "app" $app) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
