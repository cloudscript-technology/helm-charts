apiVersion: v2
name: dumpscript
description: The DumpScript is a unified system for backup and restore of MySQL, PostgreSQL and MongoDB databases to S3-compatible storage and Azure Blob Storage.
type: application
version: 1.8.3
appVersion: "v0.0.42-alpine-edge"
kubeVersion: ">= 1.27.0-0"
home: https://cloudscript.com.br
icon: https://charts.cloudscript.com.br/helm-charts/dumpscript/cloudscript-logo.png
keywords:
  - kubernetes
  - helm
  - dumpscript
  - cloudscript
  - backup
  - restore
  - mysql
  - postgresql
  - mongodb
  - s3
  - azure
  - blob-storage
maintainers:
  - name: Jonathan Schmitt
    email: jonathan.schmitt@cloudscript.com.br
  - name: Helias Rodrigues
    email: helias.rodrigues@cloudscript.com.br
dependencies: []
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: Make S3 storage class configurable via S3_STORAGE_CLASS env var instead of hardcoded STANDARD_IA, fixing InvalidStorageClass errors on GCS and other S3-compatible backends
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/images: |
    - name: dumpscript alpine3.21
      image: ghcr.io/cloudscript-technology/dumpscript:v0.0.42-alpine-3-21
    - name: dumpscript alpine3.20
      image: ghcr.io/cloudscript-technology/dumpscript:v0.0.42-alpine-3-20
    - name: dumpscript alpine-edge (PostgreSQL 18)
      image: ghcr.io/cloudscript-technology/dumpscript:v0.0.42-alpine-edge
  artifacthub.io/displayName: "Dump Script"
  artifacthub.io/license: "MIT"
  artifacthub.io/provider: "Cloudscript"
  artifacthub.io/links: |
    - name: Cloudscript
      url: https://cloudscript.com.br
    - name: Source
      url: https://github.com/cloudscript-technology/helm-charts
  artifacthub.io/valuesSchema: "https://charts.cloudscript.com.br/dumpscript/1.8.3/values-schema.json"
