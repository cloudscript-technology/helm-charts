{{/*
Gateway API - HTTPRoute resources.
Uma HTTPRoute por item em gatewayApi.httpRoutes. Cada route pode ter múltiplas
rules com tipos: redirect (HTTP->HTTPS) ou http (backendRef para o service da app).
*/}}
{{- range $app := .Values.apps }}
{{- if and $app.enabled $app.gatewayApi $app.gatewayApi.enabled $app.gatewayApi.httpRoutes }}
{{- $gatewayName := "" }}
{{- if $app.gatewayApi.gatewayRef }}
{{- $gatewayName = $app.gatewayApi.gatewayRef.name }}
{{- else if $app.gatewayApi.gateway }}
{{- $gatewayName = $app.gatewayApi.gateway.name | default (include "deploy-apps.app.fullname" (dict "root" $ "app" $app)) }}
{{- else }}
{{- $gatewayName = include "deploy-apps.app.fullname" (dict "root" $ "app" $app) }}
{{- end }}
{{- $appFullname := include "deploy-apps.app.fullname" (dict "root" $ "app" $app) }}
{{- $appServicePort := 80 }}
{{- if and $app.service $app.service.ports }}
{{- $svcPort := first $app.service.ports }}
{{- if $svcPort }}
{{- $appServicePort = $svcPort.port | int }}
{{- end }}
{{- end }}
{{- range $idx, $route := $app.gatewayApi.httpRoutes }}
{{- if $route.enabled | default true }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-%s" $appFullname ($route.name | default (printf "route-%d" $idx)) | trunc 63 }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "deploy-apps.app.labels" (dict "root" $ "app" $app) | nindent 4 }}
    {{- with $route.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      {{- if $route.gatewayRef }}
      name: {{ $route.gatewayRef.name }}
      {{- if $route.gatewayRef.namespace }}
      namespace: {{ $route.gatewayRef.namespace }}
      {{- end }}
      {{- else }}
      name: {{ $gatewayName }}
      {{- if and $app.gatewayApi.gatewayRef $app.gatewayApi.gatewayRef.namespace }}
      namespace: {{ $app.gatewayApi.gatewayRef.namespace }}
      {{- end }}
      {{- end }}
      {{- if $route.listenerName }}
      sectionName: {{ $route.listenerName }}
      {{- end }}
  {{- if $route.hostnames }}
  hostnames:
    {{- range $route.hostnames }}
    - {{ . }}
    {{- end }}
  {{- end }}
  rules:
  {{- range $rule := $route.rules }}
  {{- if eq $rule.type "redirect" }}
  {{- /* Rule tipo redirect: RequestRedirect (ex: HTTP -> HTTPS) */}}
  - matches:
    {{- if $rule.matches }}
    {{- toYaml $rule.matches | nindent 4 }}
    {{- else }}
    - path:
        type: PathPrefix
        value: /
    {{- end }}
    filters:
      - type: RequestRedirect
        requestRedirect:
          {{- $redirect := $rule.requestRedirect | default dict }}
          scheme: {{ $redirect.scheme | default "https" }}
          {{- if $redirect.port }}
          port: {{ $redirect.port }}
          {{- end }}
          statusCode: {{ $redirect.statusCode | default 301 }}
          {{- if $redirect.hostname }}
          hostname: {{ $redirect.hostname }}
          {{- end }}
          {{- if $redirect.path }}
          path:
            {{- toYaml $redirect.path | nindent 12 }}
          {{- end }}
  {{- else }}
  {{- /* Rule tipo http: backendRef para o service da app */}}
  - matches:
    {{- if $rule.matches }}
    {{- toYaml $rule.matches | nindent 4 }}
    {{- else }}
    - path:
        type: PathPrefix
        value: /
    {{- end }}
    {{- if $rule.filters }}
    filters:
      {{- toYaml $rule.filters | nindent 6 }}
    {{- end }}
    backendRefs:
      - group: ""
        kind: Service
        {{- $backend := $rule.backendRef | default dict }}
        name: {{ $backend.name | default $appFullname }}
        port: {{ $backend.port | default $appServicePort }}
        {{- if $backend.weight }}
        weight: {{ $backend.weight }}
        {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
