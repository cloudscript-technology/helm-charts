# Default values for dumpscript

image:
  # Image repository
  repository: ghcr.io/cloudscript-technology/dumpscript
  # Image pull policy
  pullPolicy: IfNotPresent
  # Image tag. Default is the chart appVersion
  tag: ""

# Image pull secrets
imagePullSecrets: []

# Override the name of the chart
nameOverride: ""

# Override the full name of the chart
fullnameOverride: ""

databases:
  # Example: S3 backend (default) with PostgreSQL
  - type: postgresql
    # Explicitly set the dumpscript image for the PostgreSQL database
    # image:
      # repository: ghcr.io/cloudscript-technology/dumpscript
      # pullPolicy: IfNotPresent
      # tag: "xyz-alpine-3.21"         # PostgreSQL 15, 16, 17
      # tag: "xyz-alpine-edge"         # PostgreSQL 16, 17, 18 (required for 18)
    # Version of the PostgreSQL client (13, 14, 15, 16, 17, 18)
    # Use alpine-edge image tag for PostgreSQL 18
    # This version should match your PostgreSQL server version to avoid compatibility issues
    version: "18"
    # Backup periodicity: daily, weekly, monthly, yearly
    periodicity:
    - type: daily
      retentionDays: 7
      schedule: "0 1 * * *"  # Every day at 1am
    - type: weekly
      retentionDays: 30
      schedule: "0 2 * * *"  # Every day at 2am
    - type: monthly
      retentionDays: 365
      schedule: "0 3 * * *"  # Every day at 3am
    # Database connection information
    connectionInfo:
      # Database host (if secretName is not provided)
      host: ""
      # Database username (if secretName is not provided)
      username: ""
      # Database password (if secretName is not provided)
      password: ""
      # Database name (if secretName is not provided)
      database: ""
      # Database port (if secretName is not provided)
      port: 5432
      # Name of the secret containing the connection information for the database
      secretName: ""
    objectStorage:
      # Storage backend: "s3" (default) or "azure"
      backend: "s3"
      # --- S3 backend settings ---
      # Region for the S3 bucket (e.g. us-west-2)
      region: ""
      # S3 bucket name
      bucket: ""
      # Prefix for the database dump in the S3 bucket
      bucketPrefix: ""
      # Name of the Kubernetes secret containing the S3 credentials (keys: accessKeyId, secretAccessKey)
      secretName: ""
      # Custom S3 endpoint URL for S3-compatible storage (e.g. MinIO, DigitalOcean Spaces)
      # Example: https://minio.example.com:9000
      endpointUrl: ""
      # --- Azure Blob Storage backend settings ---
      # azure:
      #   # Azure storage account name
      #   storageAccount: ""
      #   # Azure storage account access key (ignored if secretName is provided)
      #   storageKey: ""
      #   # Azure SAS token (alternative to storageKey, ignored if secretName is provided)
      #   sasToken: ""
      #   # Azure Blob container name
      #   container: ""
      #   # Prefix for the database dump in the Azure container
      #   prefix: ""
      #   # Name of the Kubernetes secret containing Azure credentials (keys: storageAccount, storageKey or sasToken)
      #   secretName: ""
    # Extra arguments for the database dump (e.g. --encoding=utf8, --no-owner)
    extraArgs: ""
    # IMPORTANT: We recommend using a ephemeral volume to store the database dump if the database is too large
    # Extra volumes for the pod
    extraVolumes: []
    # extraVolumes:
    #   - name: temp-data
    #     ephemeral:
    #       volumeClaimTemplate:
    #         metadata:
    #           labels:
    #             type: temp-data
    #         spec:
    #           accessModes: [ "ReadWriteOnce" ]
    #           storageClassName: "gp3"
    #           resources:
    #             requests:
    #               storage: 10Gi

    # Extra volume mounts for the pod
    extraVolumeMounts: []
    # extraVolumeMounts:
    #   - name: "temp-data"
    #     mountPath: "/dumpscript"
    #     readOnly: false
    successHistoryLimit: 3
    failureHistoryLimit: 1
  # Example: Azure Blob Storage backend with MySQL
  - type: mysql
    # Version of the MySQL/MariaDB client (8.0, 10.11, 11.4)
    # - Use "8.0" for MySQL 8.0
    # - Use "10.11" for MariaDB 10.11 (default)
    # - Use "11.4" for MariaDB 11.4
    version: "10.11"
    # Backup periodicity: daily, weekly, monthly, yearly
    periodicity:
    - type: daily
      retentionDays: 7
      schedule: "0 1 * * *"  # Every day at 1am
    - type: weekly
      retentionDays: 30
      schedule: "0 2 * * *"  # Every day at 2am
    - type: monthly
      retentionDays: 365
      schedule: "0 3 * * *"  # Every day at 3am
    # Database connection information
    connectionInfo:
      # Database host (if secretName is not provided)
      host: ""
      # Database username (if secretName is not provided)
      username: ""
      # Database password (if secretName is not provided)
      password: ""
      # Database name (if secretName is not provided)
      database: ""
      # Database port (if secretName is not provided)
      port: 3306
      # Name of the secret containing the connection information for the database
      secretName: ""
    objectStorage:
      # Storage backend: "s3" (default) or "azure"
      backend: "azure"
      # --- Azure Blob Storage backend settings ---
      azure:
        # Azure storage account name
        storageAccount: ""
        # Azure storage account access key (ignored if secretName is provided)
        storageKey: ""
        # Azure SAS token (alternative to storageKey, ignored if secretName is provided)
        # sasToken: ""
        # Azure Blob container name
        container: ""
        # Prefix for the database dump in the Azure container
        prefix: ""
        # Name of the Kubernetes secret containing Azure credentials (keys: storageAccount, storageKey or sasToken)
        secretName: ""
    # Extra arguments for the database dump (e.g. --single-transaction, --routines)
    extraArgs: ""
    # IMPORTANT: We recommend using a ephemeral volume to store the database dump if the database is too large
    # Extra volumes for the pod
    extraVolumes: []
    # Extra volume mounts for the pod
    extraVolumeMounts: []
    successHistoryLimit: 3
    failureHistoryLimit: 1

notifications:
  slack:
    # Enable Slack notifications
    enabled: false
    # Slack webhook URL (will be ignored if webhookUrlFromSecret is provided)
    webhookUrl: ""
    # Name of the secret containing the Slack webhook URL (optional)
    webhookUrlFromSecret: {}
    # webhookUrlFromSecret:
    #   name: "dumpscript-slack-webhook-secret"
    #   key: "webhook_url"
    # Slack channel (optional)
    channel: ""
    # Slack username (optional)
    username: ""
    # Notify on success
    notifyOnSuccess: false

serviceAccount:
  # Create a service account
  create: true
  # Automount service account token
  automount: true
  # Annotations for the service account
  annotations: {}
  # Name of the service account
  name: ""
  # Namespace for the service account. Required if create=true
  namespace: ""

# Annotations for the pod
podAnnotations: {}

# Labels for the pod
podLabels: {}

# Security context for the pod
podSecurityContext: {}
  # fsGroup: 2000

# Security context for the container
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Resource requests and limits for the container
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Node selector for the pod
nodeSelector: {}

# Tolerations for the pod
tolerations: []

# Affinity rules for the pod
affinity: {}
